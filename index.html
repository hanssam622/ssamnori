<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쌤노리 | 교육용 웹게임 & 교사 프로그램 포트폴리오</title>
  <meta name="description" content="쌤노리의 학생용 전자칠판 웹게임과 교사를 위한 기타 프로그램 포트폴리오 사이트입니다. 바로 플레이하거나 다운로드할 수 있습니다.">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header Navigation -->
  <header class="header">
    <div class="container header-container">
      <a href="#" class="logo-link" id="logo-nav">
        <img src="assets/ssamnori-logo.png" alt="쌤노리" class="site-logo">
        <span class="logo-badge">Portfolio</span>
      </a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="라이트 테마로 변경">
        <span class="theme-toggle-icon" aria-hidden="true">☀</span>
        <span class="theme-toggle-text">Light</span>
      </button>
    </div>
  </header>

  <!-- Hero Banner -->
  <section class="hero">
    <div class="container">
      <!-- Interactive Brand Logo with peeking characters -->
      <div class="hero-brand-logo" aria-hidden="true">
        <img src="assets/char_boy.png" alt="" class="hero-random-char" id="hero-random-char">
        <img src="assets/speech-bubbles/bubble-1.png" alt="" class="hero-speech-image" id="hero-speech-image">
        <img src="assets/ssamnori-logo.png" alt="쌤노리" class="hero-logo-image">
      </div>
      
      <span class="hero-subtitle">Interactive Class Experience</span>
      <h1 class="hero-title">교실을 더 즐겁게,<br><span>배움을 더 역동적이게</span></h1>
      <p class="hero-desc">
        전자칠판과 웹 브라우저만 있다면 언제든 즐길 수 있는 학생용 학습 게임과 교사를 위한 스마트 수업 도구를 만드는 <strong>아츄쌤</strong>의 개인 아카이브입니다.
      </p>
    </div>
  </section>

  <!-- Main Projects Section -->
  <main class="container">
    
    <!-- Category Tabs Filter -->
    <div class="filter-section">
      <div class="tab-container" role="tablist" aria-label="프로젝트 카테고리">
        <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="grid-container" data-filter="all" id="tab-all">
          전체 보기
        </button>
        <button class="tab-btn" role="tab" aria-selected="false" aria-controls="grid-container" data-filter="web-game" id="tab-web-game">
          🎮 학생용 웹게임
        </button>
        <button class="tab-btn" role="tab" aria-selected="false" aria-controls="grid-container" data-filter="other-program" id="tab-other-program">
          🛠️ 기타 프로그램
        </button>
        <button class="tab-btn" role="tab" aria-selected="false" aria-controls="translation-project" data-filter="translation-project" id="tab-translation-project">
          교과번역 프로젝트
        </button>
      </div>
    </div>

    <!-- Portfolio Card Grid -->
    <div class="portfolio-grid" id="grid-container" aria-live="polite"></div>

    <!-- Curriculum Translation Project -->
    <section class="translation-section hidden" id="translation-project">
      <div class="section-heading">
        <span class="section-kicker">Archive</span>
        <h2 class="section-title">교과번역 프로젝트</h2>
      </div>

      <div class="translation-tabs" aria-label="교과 선택">
        <button class="translation-tab active" type="button" data-subject="korean">국어</button>
        <button class="translation-tab" type="button" data-subject="social">사회</button>
        <button class="translation-tab" type="button" data-subject="science">과학</button>
        <button class="translation-tab" type="button" data-subject="moral">도덕</button>
      </div>

      <div class="translation-grade-tabs" aria-label="학년 선택">
        <button class="grade-tab active" type="button" data-grade="1">1학년</button>
        <button class="grade-tab" type="button" data-grade="2">2학년</button>
        <button class="grade-tab" type="button" data-grade="3">3학년</button>
        <button class="grade-tab" type="button" data-grade="4">4학년</button>
        <button class="grade-tab" type="button" data-grade="5">5학년</button>
        <button class="grade-tab" type="button" data-grade="6">6학년</button>
      </div>

      <div class="translation-table-wrap">
        <table class="translation-table">
          <thead>
            <tr>
              <th>학년</th>
              <th>학기</th>
              <th>단원</th>
              <th>차시</th>
              <th>자료명</th>
              <th>번역본</th>
              <th>추가자료</th>
              <th>비고</th>
            </tr>
          </thead>
          <tbody id="translation-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <span class="footer-logo">쌤노리</span>
      <div class="footer-links">
        <a href="https://github.com/achuhanssam" target="_blank" class="footer-link">GitHub</a>
        <button type="button" class="footer-link footer-copy-email" data-email="hansanghyeon622@gmail.com" aria-label="이메일 주소 복사">hansanghyeon622@gmail.com</button>
        <a href="#" class="footer-link">이용안내</a>
      </div>
      <p class="footer-text">
        © 2026 쌤노리. All Rights Reserved. 본 사이트의 웹 게임 및 도구는 교육 목적의 비상업적 용도로 자유롭게 사용하실 수 있습니다.
      </p>
    </div>
  </footer>

  <!-- JS Controller -->
  <script src="app.js"></script>
</body>
</html>
