<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>티로그 (test) | 쌤노리</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <a href="../index.html" class="logo-link">
        <img src="../assets/ssamnori-logo.png" alt="쌤노리" class="site-logo">
        <span class="logo-badge">Portfolio</span>
      </a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="라이트 테마로 변경">
        <span class="theme-toggle-icon" aria-hidden="true">○</span>
        <span class="theme-toggle-text">Light</span>
      </button>
    </div>
  </header>
  <main class="program-main">
    <div class="program-shell">
      <a href="../index.html" class="program-back">← 목록으로</a>
      <section class="program-hero">
        <div>
          <span class="program-kicker">Program Guide</span>
          <h1 class="program-title">티로그 (test)</h1>
          <p class="program-desc">디지털 교무수첩과 수업파일 관리를 한곳에 모으는 교사용 업무 정리 프로그램입니다.</p>
          <div class="program-actions">
            <a href="#" class="btn btn-download-game" data-download-key="tlog">다운로드</a>
          </div>
        </div>
        <div class="program-preview">
          <img src="../assets/thumbnails/tlog.png" alt="티로그 썸네일">
        </div>
      </section>
      <section class="program-section">
        <h2>사용법</h2>
        <ul>
          <li>수업 기록과 파일을 과목이나 날짜 기준으로 정리합니다.</li>
          <li>필요한 자료를 빠르게 검색하고 열람합니다.</li>
          <li>자주 쓰는 수업 자료를 별도로 관리합니다.</li>
        </ul>
      </section>
      <section class="program-section">
        <h2>자료</h2>
        <p>썸네일과 상세 스크린샷은 자료가 준비되는 대로 추가됩니다.</p>
      </section>
    </div>
  </main>
  <script src="../app.js"></script>
</body>
</html>
