<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미니노리 | 쌤노리</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <a href="../index.html" class="logo-link">
        <img src="../assets/ssamnori-logo.png" alt="쌤노리" class="site-logo">
        <span class="logo-badge">Portfolio</span>
      </a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="라이트 테마로 변경">
        <span class="theme-toggle-icon" aria-hidden="true">○</span>
        <span class="theme-toggle-text">Light</span>
      </button>
    </div>
  </header>
  <main class="program-main">
    <div class="program-shell">
      <a href="../index.html" class="program-back">← 목록으로</a>
      <section class="program-hero">
        <div>
          <span class="program-kicker">Program Guide</span>
          <h1 class="program-title">미니노리</h1>
          <p class="program-desc">다같이 하는 전자칠판 종합 게임입니다. 짧고 빠른 교실 미니게임을 한곳에 모읍니다.</p>
          <div class="program-actions">
            <a href="#" class="btn btn-download-game" data-download-key="mininori">다운로드</a>
          </div>
        </div>
        <div class="program-preview">
          <img src="../assets/thumbnails/mininori.png" alt="미니노리 썸네일">
        </div>
      </section>
      <section class="program-section">
        <h2>사용법</h2>
        <ul>
          <li>전자칠판에서 프로그램을 실행합니다.</li>
          <li>수업 흐름에 맞는 미니게임을 선택합니다.</li>
          <li>학생들이 함께 참여하며 점수나 결과를 확인합니다.</li>
        </ul>
      </section>
      <section class="program-section">
        <h2>자료</h2>
        <p>썸네일과 상세 스크린샷은 자료가 준비되는 대로 추가됩니다.</p>
      </section>
    </div>
  </main>
  <script src="../app.js"></script>
</body>
</html>
