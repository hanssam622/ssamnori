<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배치누끼 | 쌤노리</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <a href="../index.html" class="logo-link">
        <img src="../assets/ssamnori-logo.png" alt="쌤노리" class="site-logo">
        <span class="logo-badge">Portfolio</span>
      </a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="라이트 테마로 변경">
        <span class="theme-toggle-icon" aria-hidden="true">○</span>
        <span class="theme-toggle-text">Light</span>
      </button>
    </div>
  </header>
  <main class="program-main">
    <div class="program-shell">
      <a href="../index.html" class="program-back">← 목록으로</a>
      <section class="program-hero">
        <div>
          <span class="program-kicker">Program Guide</span>
          <h1 class="program-title">배치누끼</h1>
          <p class="program-desc">캐릭터 이미지를 한 번에 정리하고 배경을 제거하는 이미지 누끼 따기 프로그램입니다.</p>
          <div class="program-actions">
            <a href="#" class="btn btn-download-game" data-download-key="batchnuki">다운로드</a>
          </div>
        </div>
        <div class="program-preview">스크린샷 준비 중</div>
      </section>
      <section class="program-section">
        <h2>사용법</h2>
        <ul>
          <li>처리할 이미지 파일을 선택합니다.</li>
          <li>배경 제거 옵션을 적용합니다.</li>
          <li>완성된 이미지를 수업자료나 게임 소스로 저장합니다.</li>
        </ul>
      </section>
      <section class="program-section">
        <h2>자료</h2>
        <p>썸네일과 상세 스크린샷은 자료가 준비되는 대로 추가됩니다.</p>
      </section>
    </div>
  </main>
  <script src="../app.js"></script>
</body>
</html>
