<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브레인 마인드맵 메이커 - achuhanssam</title>
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #090d16;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      box-sizing: border-box;
    }
    .card {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 3rem 2rem;
      max-width: 500px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
    h1 {
      color: #10b981;
      font-size: 2rem;
      margin-top: 0;
      margin-bottom: 1rem;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .badge {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #34d399;
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: inline-block;
    }
    .btn-back {
      background: #10b981;
      color: white;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-back:hover {
      background: #059669;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">UNDER DEVELOPMENT</span>
    <h1>브레인 마인드맵 메이커 🧠</h1>
    <p>
      현재 대형 화면 터치 센서 연동 및 마인드맵 이미지 내보내기(PDF/PNG) 기능을 고도화하고 있습니다. 완성도 높은 도구로 찾아뵙겠습니다.
    </p>
    <a href="javascript:history.back()" class="btn-back">뒤로 가기</a>
  </div>
</body>
</html>
