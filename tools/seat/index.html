<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교실 자리 배치기 - achuhanssam</title>
  <style>
    body {
      margin: 0;
      padding: 1.5rem;
      background: #0f172a;
      color: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    h1 {
      font-size: 1.4rem;
      color: #10b981;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .desc {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 750px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1.5rem;
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-bottom: 0.25rem;
    }

    .student-input {
      width: 100%;
      height: 180px;
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 0.5rem;
      color: white;
      font-size: 0.85rem;
      resize: none;
      box-sizing: border-box;
      outline: none;
    }

    .student-input:focus {
      border-color: #10b981;
    }

    .btn-shuffle {
      background: #10b981;
      color: white;
      font-weight: 600;
      border: none;
      padding: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .btn-shuffle:hover {
      background: #059669;
    }

    .classroom-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .blackboard {
      width: 100%;
      max-width: 300px;
      background: #334155;
      color: #94a3b8;
      font-size: 0.8rem;
      text-align: center;
      padding: 0.4rem;
      border-radius: 4px;
      font-weight: bold;
      border-bottom: 3px solid #1e293b;
    }

    .seat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      width: 100%;
      min-height: 250px;
    }

    .seat {
      background: #334155;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      aspect-ratio: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.25rem;
      transition: all 0.3s;
    }

    .seat.active {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
    }

    .seat-number {
      font-size: 0.65rem;
      color: #94a3b8;
      margin-bottom: 2px;
    }

    .seat-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      text-align: center;
      word-break: keep-all;
    }

    .seat-anim {
      animation: flipIn 0.5s ease forwards;
    }

    @keyframes flipIn {
      from {
        transform: rotateX(90deg);
        opacity: 0;
      }
      to {
        transform: rotateX(0deg);
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      .container {
        grid-template-columns: 1fr;
      }
      .seat-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

  <h1>교실 자리 배치기 🪑</h1>
  <p class="desc">학생들의 이름을 무작위로 추첨하여 교실 좌석 배치표를 만듭니다.</p>

  <div class="container">
    
    <div class="controls">
      <div>
        <div class="section-title">학생 명단 입력</div>
        <textarea class="student-input" id="names-input">홍길동&#10;김영희&#10;이철수&#10;박민수&#10;정지원&#10;최현우&#10;한지민&#10;강유진&#10;조태양&#10;윤설아&#10;임바다&#10;서하늘</textarea>
      </div>
      
      <button class="btn-shuffle" id="btn-shuffle">자리 섞기</button>
    </div>

    <div class="classroom-layout">
      <div class="blackboard">칠 판 (교탁 방향)</div>
      
      <div class="seat-grid" id="seat-grid">
        <!-- Seats generated here -->
      </div>
    </div>

  </div>

  <script>
    const namesInput = document.getElementById('names-input');
    const btnShuffle = document.getElementById('btn-shuffle');
    const seatGrid = document.getElementById('seat-grid');
    const totalSeats = 16; // 4x4 layout

    function getNames() {
      return namesInput.value
        .split('\n')
        .map(name => name.trim())
        .filter(name => name.length > 0);
    }

    function generateGrid() {
      seatGrid.innerHTML = '';
      const names = getNames();
      
      for (let i = 0; i < totalSeats; i++) {
        const seat = document.createElement('div');
        seat.className = 'seat';
        
        const seatNum = document.createElement('span');
        seatNum.className = 'seat-number';
        seatNum.textContent = `${i + 1}번`;
        
        const seatName = document.createElement('span');
        seatName.className = 'seat-name';
        
        if (i < names.length) {
          seatName.textContent = names[i];
          seat.classList.add('active');
        } else {
          seatName.textContent = '-';
        }
        
        seat.appendChild(seatNum);
        seat.appendChild(seatName);
        seatGrid.appendChild(seat);
      }
    }

    function shuffle() {
      const names = getNames();
      if (names.length === 0) {
        alert('이름을 입력해주세요!');
        return;
      }

      // Fisher-Yates Shuffle
      for (let i = names.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [names[i], names[j]] = [names[j], names[i]];
      }

      seatGrid.innerHTML = '';
      
      for (let i = 0; i < totalSeats; i++) {
        const seat = document.createElement('div');
        seat.className = 'seat seat-anim';
        // Add animation delay based on seating index
        seat.style.animationDelay = `${i * 30}ms`;
        
        const seatNum = document.createElement('span');
        seatNum.className = 'seat-number';
        seatNum.textContent = `${i + 1}번`;
        
        const seatName = document.createElement('span');
        seatName.className = 'seat-name';
        
        if (i < names.length) {
          seatName.textContent = names[i];
          seat.classList.add('active');
        } else {
          seatName.textContent = '-';
        }
        
        seat.appendChild(seatNum);
        seat.appendChild(seatName);
        seatGrid.appendChild(seat);
      }
    }

    btnShuffle.addEventListener('click', shuffle);

    // Initial grid render
    generateGrid();
  </script>
</body>
</html>
