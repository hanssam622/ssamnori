<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방탈출: 교실 탈출 - achuhanssam</title>
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #0b0f19;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      box-sizing: border-box;
    }
    .card {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 3rem 2rem;
      max-width: 500px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
    h1 {
      color: #06b6d4;
      font-size: 2rem;
      margin-top: 0;
      margin-bottom: 1rem;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .badge {
      background: rgba(6, 182, 212, 0.15);
      border: 1px solid rgba(6, 182, 212, 0.3);
      color: #22d3ee;
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: inline-block;
    }
    .btn-back {
      background: #06b6d4;
      color: white;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-back:hover {
      background: #0891b2;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">COMING SOON</span>
    <h1>방탈출: 교실 탈출 🔑</h1>
    <p>
      현재 이 게임은 출시 준비 중입니다. 교실 곳곳에 배치할 복습 퀴즈 팩과 단서 힌트를 직접 제작하여 업로드할 수 있는 고성능 에디터 기능을 보강하고 있습니다. 조금만 기다려주세요!
    </p>
    <a href="javascript:history.back()" class="btn-back">뒤로 가기</a>
  </div>
</body>
</html>
